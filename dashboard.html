<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>集团品质关键岗位KPI达成看板</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Microsoft YaHei',sans-serif;background:#0f1923;color:#e0e8f0}
.header{text-align:center;padding:6px 0;background:linear-gradient(135deg,#0a1628,#162a4a);border-bottom:2px solid #1e90ff}
.header h1{font-size:20px;letter-spacing:3px;background:linear-gradient(90deg,#4fc3f7,#81d4fa,#4fc3f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{font-size:10px;color:#7eb8da;margin-top:1px}
.main{display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:calc(50vh - 24px) calc(50vh - 24px);gap:6px;padding:6px;height:calc(100vh - 42px)}
.card{background:linear-gradient(145deg,#131f30,#1a2940);border:1px solid #1e3a5f;border-radius:8px;padding:8px;overflow:hidden;position:relative}
.card-title{font-size:11px;font-weight:700;color:#4fc3f7;margin-bottom:4px;padding-bottom:3px;border-bottom:1px solid #1e3a5f}
.ov-row{display:flex;gap:4px;margin-bottom:4px}
.ov-item{flex:1;background:#1a2940;border-radius:5px;padding:3px;text-align:center}
.ov-item .num{font-size:15px;font-weight:700;color:#4fc3f7}
.ov-item .label{font-size:8px;color:#7eb8da}
.grade-row{display:flex;gap:3px;margin-bottom:3px;flex-wrap:wrap}
.grade-badge{padding:2px 6px;border-radius:10px;font-size:9px;font-weight:700;cursor:pointer;border:2px solid transparent}
.grade-badge:hover,.grade-badge.active{transform:scale(1.05);box-shadow:0 0 8px rgba(30,144,255,.4)}
.grade-s{background:#ff6b35;color:#fff}.grade-a{background:#4caf50;color:#fff}.grade-b{background:#2196f3;color:#fff}.grade-c{background:#ff9800;color:#fff}.grade-d{background:#f44336;color:#fff}
table{width:100%;border-collapse:collapse;font-size:10px}
th{background:#162a4a;color:#81d4fa;padding:3px;text-align:left;font-weight:600;position:sticky;top:0;z-index:1}
td{padding:2px 3px;border-bottom:1px solid #1a2d45}
tr:hover{background:rgba(30,144,255,.1)}
.clickable{cursor:pointer;color:#4fc3f7;text-decoration:underline}.clickable:hover{color:#81d4fa}
.scroll-wrap{overflow-y:auto}
.scroll-wrap::-webkit-scrollbar{width:3px}
.scroll-wrap::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:2px}
.dept-filter{display:flex;gap:3px;margin-bottom:3px;flex-wrap:wrap}
.dept-btn{padding:1px 6px;border-radius:8px;font-size:9px;background:#1a2d45;color:#7eb8da;border:1px solid #1e3a5f;cursor:pointer}
.dept-btn:hover,.dept-btn.active{background:#1e90ff;color:#fff;border-color:#1e90ff}
.rank-num{display:inline-flex;width:16px;height:16px;align-items:center;justify-content:center;border-radius:50%;font-size:8px;font-weight:700}
.rank-1{background:#ff6b35;color:#fff}.rank-2{background:#ff9800;color:#fff}.rank-3{background:#ffc107;color:#333}
.score-bar{height:4px;border-radius:2px;background:#1a2d45;margin-top:1px}
.score-bar-fill{height:100%;border-radius:2px}
.top-item{display:flex;align-items:center;gap:4px;padding:3px 5px;background:#1a2940;border-radius:5px;margin-bottom:2px;cursor:pointer;font-size:10px}
.top-item:hover{background:#1e3a5f}
.top-item .sc{font-weight:700;margin-left:auto}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.65);z-index:1000;justify-content:center;align-items:center}
.modal-overlay.show{display:flex}
.modal{background:#131f30;border:1px solid #1e3a5f;border-radius:10px;padding:16px;width:900px;max-width:95vw;max-height:80vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.modal-header h3{color:#4fc3f7;font-size:15px}
.modal-close{width:24px;height:24px;border-radius:50%;background:#1a2d45;border:1px solid #1e3a5f;color:#7eb8da;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:#f44336;color:#fff}
.kpi-card{background:#1a2940;border:1px solid #1e3a5f;border-radius:6px;padding:8px 10px;margin-bottom:6px}
.kpi-name{font-size:12px;font-weight:600}
.kpi-meta{display:flex;gap:12px;margin-top:4px;font-size:10px;color:#7eb8da;flex-wrap:wrap}
.kpi-bar{height:6px;background:#0f1923;border-radius:3px;margin-top:4px;overflow:hidden}
.kpi-bar-fill{height:100%;border-radius:3px}
#month-select{background:#1a2940;color:#4fc3f7;border:1px solid #1e3a5f;border-radius:4px;padding:1px 4px;font-size:10px;font-family:inherit;cursor:pointer;outline:none}
#month-select:hover{border-color:#1e90ff}
</style>
</head>
<body>
<div class="header">
  <h1>集团品质关键岗位 KPI 达成看板</h1>
  <div class="sub">
    <label for="month-select" style="cursor:pointer">2025年</label>
    <select id="month-select" onchange="switchMonth(this.value)"></select>
    <span> · 集团及各事业部关键岗位绩效总览 · 点击姓名/图表下钻个人指标详情</span>
  </div>
</div>
<div class="main">
  <div class="card">
    <div class="card-title">集团总览 · 事业部得分</div>
    <div id="ov-nums" class="ov-row"></div>
    <div id="chart-dept" style="width:100%;height:calc(50vh - 100px)"></div>
  </div>
  <div class="card">
    <div class="card-title">SABCD 等级分布</div>
    <div id="grade-badges" class="grade-row"></div>
    <div id="chart-grade" style="width:100%;height:calc(50vh - 80px)"></div>
  </div>
  <div class="card">
    <div class="card-title" style="color:#4caf50">🏆 最佳TOP3</div>
    <div id="top3-list"></div>
    <div class="card-title" style="color:#f44336;margin-top:3px">⚠ 最差TOP3</div>
    <div id="bottom3-list"></div>
    <div class="card-title" style="margin-top:3px">事业部雷达</div>
    <div id="chart-radar" style="width:100%;height:calc(50vh - 190px)"></div>
  </div>
  <div class="card">
    <div class="card-title">个人得分分布（点击下钻）</div>
    <div id="chart-scatter" style="width:100%;height:calc(50vh - 60px)"></div>
  </div>
  <div class="card" style="grid-column:span 2">
    <div class="card-title">全员得分排名（点击姓名下钻）</div>
    <div class="dept-filter" id="dept-filter"></div>
    <div class="scroll-wrap" id="rank-scroll" style="height:calc(50vh - 80px)">
      <table><thead><tr><th>排名</th><th>姓名</th><th>事业部</th><th>得分</th><th>等级</th><th style="width:30%">得分条</th></tr></thead>
      <tbody id="rank-tbody"></tbody></table>
    </div>
  </div>
</div>
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header"><h3 id="modal-title">个人KPI详情</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div id="modal-score-info" style="margin-bottom:8px"></div>
    <div id="modal-chart" style="width:100%;height:280px;margin-bottom:8px"></div>
    <div id="modal-kpis"></div>
  </div>
</div>
<script>
/* === PLACEHOLDER_FOR_JS === */
</script>
</body>
</html>
